<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>JavaScrit y el DOM 2ª parte</title>
	<style>
		.importante {background-color: red;
			color: yellow; font-size: 20px }
	</style>
	<script>
		function aplicaClase(){
			document.getElementById("titulo")
			.className= "importante"
		}
	</script>
</head>
<body>
<h1 id="titulo"> Título inicial</h1>
<button onclick="aplicaClase()">Aplicar clase</button>
</body>
</html>
